<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>MediBook — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --teal:    #0d9488;
    --teal-d:  #0f766e;
    --teal-l:  #ccfbf1;
    --slate:   #1e293b;
    --muted:   #64748b;
    --bg:      #f8fafc;
    --white:   #ffffff;
    --border:  #e2e8f0;
    --err:     #ef4444;
    --radius:  14px;
    --shadow:  0 20px 60px rgba(13,148,136,.12);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: grid;
    place-items: center;
    background-image:
      radial-gradient(circle at 20% 20%, rgba(13,148,136,.08) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(13,148,136,.06) 0%, transparent 50%);
  }

  .card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 3rem 2.5rem;
    width: min(420px, 92vw);
    border: 1px solid var(--border);
    animation: fadeUp .5s ease both;
  }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(20px); }
    to   { opacity:1; transform:translateY(0); }
  }

  .logo {
    display: flex;
    align-items: center;
    gap: .6rem;
    margin-bottom: 2rem;
  }

  .logo-icon {
    width: 42px; height: 42px;
    background: var(--teal);
    border-radius: 10px;
    display: grid; place-items: center;
    font-size: 1.3rem;
  }

  .logo-text {
    font-family: 'DM Serif Display', serif;
    font-size: 1.6rem;
    color: var(--slate);
    letter-spacing: -.5px;
  }

  .logo-text span { color: var(--teal); }

  h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.5rem;
    color: var(--slate);
    margin-bottom: .4rem;
  }

  .subtitle {
    color: var(--muted);
    font-size: .9rem;
    margin-bottom: 2rem;
  }

  label {
    display: block;
    font-size: .82rem;
    font-weight: 600;
    color: var(--slate);
    margin-bottom: .4rem;
    letter-spacing: .3px;
    text-transform: uppercase;
  }

  input, select {
    width: 100%;
    padding: .75rem 1rem;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: inherit;
    font-size: .95rem;
    color: var(--slate);
    background: var(--bg);
    transition: border-color .2s, box-shadow .2s;
    outline: none;
    margin-bottom: 1.2rem;
  }

  input:focus, select:focus {
    border-color: var(--teal);
    box-shadow: 0 0 0 3px rgba(13,148,136,.12);
  }

  select { cursor: pointer; }

  .btn {
    width: 100%;
    padding: .85rem;
    background: var(--teal);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: inherit;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background .2s, transform .1s;
    letter-spacing: .3px;
    margin-top: .4rem;
  }

  .btn:hover  { background: var(--teal-d); }
  .btn:active { transform: scale(.98); }

  .error {
    background: #fef2f2;
    color: var(--err);
    border: 1px solid #fecaca;
    border-radius: 8px;
    padding: .7rem 1rem;
    font-size: .88rem;
    margin-bottom: 1rem;
    display: none;
  }

  .hint {
    margin-top: 1.5rem;
    padding: 1rem;
    background: var(--teal-l);
    border-radius: 8px;
    font-size: .82rem;
    color: var(--teal-d);
  }

  .hint strong { display: block; margin-bottom: .4rem; font-weight: 600; }
  .hint code   { background: rgba(255,255,255,.7); padding: 1px 5px; border-radius: 4px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🏥</div>
    <div class="logo-text">Medi<span>Book</span></div>
  </div>

  <h2>Welcome back</h2>
  <p class="subtitle">Sign in to your account</p>

  <div class="error" id="error-msg"></div>

  <label for="username">Username</label>
  <input type="text" id="username" placeholder="Enter your username"/>

  <label for="password">Password</label>
  <input type="password" id="password" placeholder="Enter your password"/>

  <label for="role">Login as</label>
  <select id="role">
    <option value="ADMIN">Admin</option>
    <option value="DOCTOR">Doctor</option>
    <option value="PATIENT" selected>Patient</option>
  </select>

  <button class="btn" onclick="doLogin()">Sign In →</button>

  <div class="hint">
    <strong>Demo Credentials</strong>
    Admin: <code>admin</code> / <code>admin123</code><br/>
    Doctor: <code>drsmith</code> / <code>doctor123</code><br/>
    Patient: <code>john_patient</code> / <code>patient123</code>
  </div>

  <p style="text-align:center;margin-top:1.2rem;font-size:.88rem;color:var(--muted)">
    New patient?
    <button onclick="openSignup()" style="background:none;border:none;color:var(--teal);font-weight:600;cursor:pointer;font-size:.88rem;font-family:inherit;padding:0">Create an account →</button>
  </p>
</div>

<!-- SIGNUP MODAL -->
<div id="signup-overlay" style="display:none;position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:999;align-items:center;justify-content:center">
  <div style="background:#fff;border-radius:14px;padding:2rem 2rem 1.5rem;width:min(420px,92vw);box-shadow:0 20px 60px rgba(13,148,136,.15);border:1px solid var(--border);animation:fadeUp .3s ease both">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.4rem">
      <div style="font-family:'DM Serif Display',serif;font-size:1.25rem;color:var(--slate)">Create Patient Account</div>
      <button onclick="closeSignup()" style="background:none;border:none;font-size:1.5rem;cursor:pointer;color:var(--muted);line-height:1">×</button>
    </div>

    <div id="signup-error" class="error"></div>
    <div id="signup-success" style="background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0;border-radius:8px;padding:.7rem 1rem;font-size:.88rem;margin-bottom:1rem;display:none"></div>

    <label for="su-name">Full Name</label>
    <input type="text" id="su-name" placeholder="e.g. Priya Sharma"/>

    <label for="su-username">Username</label>
    <input type="text" id="su-username" placeholder="Choose a username"/>

    <label for="su-password">Password</label>
    <input type="password" id="su-password" placeholder="Min. 6 characters"/>

    <label for="su-confirm">Confirm Password</label>
    <input type="password" id="su-confirm" placeholder="Re-enter password" style="margin-bottom:1.2rem"/>

    <button class="btn" onclick="doSignup()">Sign Up as Patient</button>

    <p style="text-align:center;margin-top:1rem;font-size:.82rem;color:var(--muted)">
      Already have an account?
      <button onclick="closeSignup()" style="background:none;border:none;color:var(--teal);font-weight:600;cursor:pointer;font-size:.82rem;font-family:inherit;padding:0">Sign In</button>
    </p>
  </div>
</div>

<script>
async function doLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const role     = document.getElementById('role').value;
  const errEl    = document.getElementById('error-msg');

  errEl.style.display = 'none';
  if (!username || !password) {
    errEl.textContent = 'Please fill in all fields.';
    errEl.style.display = 'block';
    return;
  }

  try {
    const res  = await fetch('/api/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({username, password, role})
    });
    const data = await res.json();
    if (!res.ok) {
      errEl.textContent = data.error || 'Login failed.';
      errEl.style.display = 'block';
      return;
    }
    localStorage.setItem('role', data.role);
    localStorage.setItem('username', data.username);
    window.location.href = '/dashboard';
  } catch {
    errEl.textContent = 'Network error.';
    errEl.style.display = 'block';
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

function openSignup() {
  document.getElementById('signup-overlay').style.display = 'flex';
  document.getElementById('su-name').focus();
}
function closeSignup() {
  document.getElementById('signup-overlay').style.display = 'none';
  ['su-name','su-username','su-password','su-confirm'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('signup-error').style.display = 'none';
  document.getElementById('signup-success').style.display = 'none';
}

async function doSignup() {
  const name     = document.getElementById('su-name').value.trim();
  const username = document.getElementById('su-username').value.trim();
  const password = document.getElementById('su-password').value;
  const confirm  = document.getElementById('su-confirm').value;
  const errEl    = document.getElementById('signup-error');
  const okEl     = document.getElementById('signup-success');

  errEl.style.display = 'none';
  okEl.style.display  = 'none';

  if (!name || !username || !password || !confirm) {
    errEl.textContent = 'Please fill in all fields.'; errEl.style.display = 'block'; return;
  }
  if (password !== confirm) {
    errEl.textContent = 'Passwords do not match.'; errEl.style.display = 'block'; return;
  }
  if (password.length < 6) {
    errEl.textContent = 'Password must be at least 6 characters.'; errEl.style.display = 'block'; return;
  }

  try {
    const res  = await fetch('/api/signup', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({username, password, name})
    });
    const data = await res.json();
    if (!res.ok) {
      errEl.textContent = data.error || 'Signup failed.'; errEl.style.display = 'block'; return;
    }
    okEl.textContent = '✓ Account created! You can now sign in as a Patient.';
    okEl.style.display = 'block';
    // Pre-fill login form
    document.getElementById('username').value = username;
    document.getElementById('role').value = 'PATIENT';
    setTimeout(closeSignup, 2000);
  } catch {
    errEl.textContent = 'Network error.'; errEl.style.display = 'block';
  }
}
</script>
</body>
</html>
